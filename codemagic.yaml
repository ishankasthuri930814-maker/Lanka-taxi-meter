workflows:
  android-workflow:
    name: Android Build APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Locate Android Project and Build
        script: |
          # Repository එක ඇතුළේ build.gradle තියෙන නියම ෆෝල්ඩරය සොයාගැනීම
          REAL_PROJECT_DIR=$(find . -name "build.gradle*" -exec dirname {} \; | head -n 1)
          if [ -z "$REAL_PROJECT_DIR" ]; then
            echo "Error: Android project directory not found!"
            exit 1
          fi
          echo "Android Project found at: $REAL_PROJECT_DIR"
          cd "$REAL_PROJECT_DIR"
          
          # Environment එක සෙට් කිරීම
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # gradlew ෆයිල් එක නැත්නම් අලුතින් සකස් කරගැනීම
          gradle wrapper
          chmod +x gradlew
          
          # APK එක බිල්ඩ් කිරීම
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
