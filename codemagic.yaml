workflows:
  android-workflow:
    name: Android Build APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Force Upgrade Gradle and Build
        script: |
          # බිල්ඩ් එකට ඉල්ලන debug.keystore එක සර්වර් එකේ නිවැරදිම තැන සාදා ගැනීම
          echo "Generating temporary debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

          cd app
          
          # ඇප් එකට අවශ්‍ය කරන Gradle 9.3.1 සංස්කරණය සර්වර් එකට ඩවුන්ලෝඩ් කරනවා
          echo "Downloading Gradle 9.3.1..."
          wget https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-9.3.1-bin.zip
          export PATH=/opt/gradle/gradle-9.3.1/bin:$PATH
          
          # Android SDK එක සම්බන්ධ කිරීම
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # APK එක බිල්ඩ් කිරීම
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
