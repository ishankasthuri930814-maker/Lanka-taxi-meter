workflows:
  android-workflow:
    name: Android Build APK
    max_build_duration: 30
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
    scripts:
      - name: Force Gradle Build
        script: |
          # app ෆෝල්ඩර් එක ඇතුළට යනවා
          cd app
          
          # local.properties ෆයිල් එක සාදා ගැනීම
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # System එකේ තියෙන gradle command එකෙන්ම කෙලින්ම බිල්ඩ් එක ස්ටාර්ට් කරනවා
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
